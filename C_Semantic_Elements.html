<!DOCTYPE html>
<html>
<head>
    <title>Semantic HTML Example</title>
</head>

<body>

    <!-- Header section -->
    <header>
        <h1>My Website</h1>
        <p>Welcome to my webpage</p>
    </header>

    <!-- Navigation menu -->
    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <!-- Main content -->
    <main>

        <!-- Article -->
        <article>
            <h2>HTML Semantic Elements</h2>
            <p>This article explains semantic tags in HTML.</p>
        </article>

        <!-- Section -->
        <section>
            <h2>Advantages</h2>
            <p>Semantic tags improve readability and SEO.</p>
        </section>

        <!-- Aside content -->
        <aside>
            <h3>Related Info</h3>
            <p>HTML5 introduced many semantic elements.</p>
        </aside>

    </main>

    <!-- Figure and caption -->
    <figure>
        <img src="html.png" alt="HTML Logo" width="150">
        <figcaption>HTML Logo</figcaption>
    </figure>

    <!-- Footer -->
    <footer>
        <p>© 2026 My Website</p>
    </footer>

</body>
</html>
